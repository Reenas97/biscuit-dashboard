name: Avisos de pausa no Telegram

on:
  workflow_dispatch:
  schedule:
    - cron: '2-59/5 * * * *'

permissions:
  contents: read

concurrency:
  group: telegram-time-alerts
  cancel-in-progress: false

jobs:
  send-time-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Carregar o projeto
        uses: actions/checkout@v4

      - name: Preparar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm install --no-audit --no-fund

      - name: Enviar avisos pendentes
        run: npm run telegram:time-alerts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_USER_ID: ${{ secrets.FIREBASE_USER_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
